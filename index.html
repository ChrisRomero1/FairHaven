<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Fairhaven Property Solutions</title>
  <meta name="description" content="Fairhaven Property Solutions is currently updating our website. We'll be back shortly.">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a1a;
      color: #f5f5f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo-wrap { margin-bottom: 2.5rem; }
    .logo-wrap img { height: 56px; width: auto; }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #C9A96E;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.25rem;
      color: #f5f5f0;
    }

    h1 span { color: #C9A96E; }

    p {
      font-size: 1.0625rem;
      color: rgba(245,245,240,0.65);
      max-width: 440px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #C9A96E;
      margin: 0 auto 2.5rem;
    }

    .contact-block {
      font-size: 0.9375rem;
      color: rgba(245,245,240,0.5);
    }

    .contact-block a {
      color: #C9A96E;
      text-decoration: none;
    }

    .contact-block a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .logo-wrap img { height: 44px; }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="logo.png" alt="Fairhaven Property Solutions">
  </div>

  <p class="eyebrow">We'll be right back</p>

  <h1>Something better<br>is <span>coming soon.</span></h1>

  <div class="divider"></div>

  <p>We're putting the finishing touches on our updated website. In the meantime, we're still here and happy to help.</p>

  <div class="contact-block">
    Questions? Reach us at <a href="mailto:info@fairhavenpropertysolutions.com">info@fairhavenpropertysolutions.com</a><br>
    or <a href="https://calendly.com/fairhavenpropertysolutions/30min" target="_blank" rel="noopener">schedule a consultation</a>.
  </div>

</body>
</html>
